spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/pattern_recognition
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT auth. NOTE: for production, override jwt.secret with a long random value via an
# environment variable (e.g. JWT_SECRET) and do not commit the real secret.
jwt.secret=dev-secret-change-me-to-a-long-random-value-at-least-32-chars
jwt.expiration-ms=86400000
